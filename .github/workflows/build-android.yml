name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        
        run: npm install

      - name: 🚀 Build APK
        
        run: eas build -p android --profile preview --local --output build/alpha-trader.apk

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpha-trader-apk
          path: build/alpha-trader.apk
