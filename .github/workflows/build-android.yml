name: Build Android APK
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node_version: 20
          cache: 'npm'
          cache-dependency-path: alphatrader/package-lock.json

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        working-directory: ./alphatrader
        run: npm install

      - name: 🚀 Build APK
        working-directory: ./alphatrader
        run: eas build -p android --profile preview --local --output ./build/alpha-trader.apk

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: alpha-trader-apk
          path: alphatrader/build/alpha-trader.apk
